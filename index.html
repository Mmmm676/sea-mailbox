<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势测试</title>
    <!-- 只引入最核心的模型 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
        }

        #fileInput {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            color: white;
        }
    </style>
</head>
<body>
    <div id="debug">
        <div>模型状态: 加载中...</div>
        <div>摄像头: 未启动</div>
        <div>检测到手: 否</div>
        <div>两指距离: --</div>
    </div>

    <input type="file" id="fileInput" accept="video/*">
    <canvas id="canvas"></canvas>

    <video id="cam" playsinline autoplay muted style="display:none;"></video>
    <video id="video" loop muted playsinline style="display:none;"></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cam = document.getElementById('cam');
        const video = document.getElementById('video');
        const debug = document.getElementById('debug');
        const fileInput = document.getElementById('fileInput');

        let isRunning = false;
        let handsModel = null;
        let selectRect = null;
        let mediaStream = null;

        // 更新调试信息
        function updateDebug(text) {
            debug.innerHTML = text;
        }

        // 选择本地视频
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const url = URL.createObjectURL(file);
            video.src = url;
            video.onloadeddata = () => {
                video.play();
                alert('视频加载成功！现在伸出手，拇指和食指张开试试');
            };
        };

        // 启动摄像头
        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                cam.srcObject = mediaStream;
                await cam.play();
                return true;
            } catch(e) {
                console.error('摄像头启动失败:', e);
                return false;
            }
        }

        // 初始化手势模型
        async function initHands() {
            try {
                handsModel = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
                });

                handsModel.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 0,
                    minDetectionConfidence: 0.1,
                    minTrackingConfidence: 0.1
                });

                handsModel.onResults((results) => {
                    if(!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                        selectRect = null;
                        updateDebug(`
                            <div>模型状态: 已加载 ✓</div>
                            <div>摄像头: 已启动 ✓</div>
                            <div>检测到手: 否</div>
                            <div>两指距离: --</div>
                        `);
                        return;
                    }

                    const landmarks = results.multiHandLandmarks[0];
                    const thumb = landmarks[4];
                    const index = landmarks[8];
                    const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                    updateDebug(`
                        <div>模型状态: 已加载 ✓</div>
                        <div>摄像头: 已启动 ✓</div>
                        <div>检测到手: 是 ✓</div>
                        <div>两指距离: ${dist.toFixed(3)}</div>
                    `);

                    if(dist > 0.01) {
                        const x = Math.min(thumb.x, index.x) * canvas.width;
                        const y = Math.min(thumb.y, index.y) * canvas.height;
                        const w = Math.abs(thumb.x - index.x) * canvas.width * 2;
                        const h = Math.abs(thumb.y - index.y) * canvas.height * 2;

                        selectRect = { x, y, w, h };
                    } else {
                        selectRect = null;
                    }
                });

                await handsModel.initialize();
                return true;
            } catch(e) {
                console.error('模型初始化失败:', e);
                return false;
            }
        }

        // 主循环
        async function mainLoop() {
            if(!isRunning) return;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 绘制摄像头画面
            if(cam.readyState >= 2) {
                ctx.save();
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(cam, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            // 处理手势
            if(handsModel && cam.readyState >= 2) {
                try {
                    await handsModel.send({ image: cam });
                } catch(e) {
                    console.error('手势处理错误:', e);
                }
            }

            // 绘制框选区域的视频
            if(selectRect && video.readyState >= 3) {
                ctx.save();
                ctx.beginPath();
                ctx.rect(selectRect.x, selectRect.y, selectRect.w, selectRect.h);
                ctx.clip();
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 画一个红色边框，方便调试
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 3;
                ctx.strokeRect(selectRect.x, selectRect.y, selectRect.w, selectRect.h);
            }

            requestAnimationFrame(mainLoop);
        }

        // 页面加载完成后自动启动
        window.onload = async () => {
            updateDebug('<div>正在启动摄像头...</div>');
            const camOk = await startCamera();
            
            if(!camOk) {
                updateDebug('<div>摄像头启动失败！请允许权限</div>');
                return;
            }

            updateDebug('<div>正在加载手势模型...</div>');
            const modelOk = await initHands();
            
            if(!modelOk) {
                updateDebug('<div>手势模型加载失败！请刷新页面</div>');
                return;
            }

            isRunning = true;
            mainLoop();

            updateDebug(`
                <div>模型状态: 已加载 ✓</div>
                <div>摄像头: 已启动 ✓</div>
                <div>检测到手: 否</div>
                <div>两指距离: --</div>
                <div style="margin-top:10px;color:#4ade80;">请点击右上角选择本地视频</div>
            `);
        };
    </script>
</body>
</html>
