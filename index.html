<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海的信箱 · 隔空手框海景</title>
    <!-- 只引入核心模型，不引入camera_utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #42a5f5 0%, #0d47a1 50%, #0a1929 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* 调试信息面板 */
        .debug-panel {
            position: fixed;
            top: 60px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            max-width: 300px;
        }

        .debug-item {
            margin: 5px 0;
        }

        .debug-success { color: #4ade80; }
        .debug-error { color: #f87171; }
        .debug-info { color: #60a5fa; }

        /* 首页卡片 */
        .box-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 400px;
        }

        .cards-stack {
            position: relative;
            width: 100%;
            height: 100%;
            transform: rotate(-10deg);
        }

        .card-item {
            position: absolute;
            width: 200px;
            height: 280px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .card-item:nth-child(1) { transform: translate(0, 0) rotate(-3deg); }
        .card-item:nth-child(2) { transform: translate(40px, 20px) rotate(-1deg); }
        .card-item:nth-child(3) { transform: translate(80px, 40px) rotate(1deg); }
        .card-item:nth-child(4) { transform: translate(120px, 60px) rotate(3deg); }
        .card-item:nth-child(5) { transform: translate(160px, 80px) rotate(5deg); }
        .card-item:nth-child(6) { transform: translate(200px, 100px) rotate(7deg); }

        .card-item:hover {
            transform: translate(calc(var(--translate-x, 0px) - 10px), calc(var(--translate-y, 0px) - 20px)) rotate(0deg) scale(1.05) !important;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            z-index: 20 !important;
        }

        /* 交互页面 */
        #interactPage {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10;
            display: none;
        }

        #interactPage.active {
            display: block;
        }

        #outputCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .gesture-hint {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            z-index: 20;
        }

        .back-btn {
            position: absolute;
            top: 18px;
            left: 18px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 20;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 100;
        }

        /* 隐藏的视频元素 */
        #camVideo, #seaVideo {
            display: none;
        }
    </style>
</head>
<body>

<!-- 调试信息面板 -->
<div class="debug-panel" id="debugPanel">
    <div class="debug-item">📊 调试信息</div>
    <div class="debug-item" id="debugModel">模型状态: 等待加载</div>
    <div class="debug-item" id="debugCamera">摄像头状态: 未启动</div>
    <div class="debug-item" id="debugFrame">帧处理: 0</div>
    <div class="debug-item" id="debugHand">检测到手: 否</div>
    <div class="debug-item" id="debugFinger">两指距离: --</div>
    <div class="debug-item" id="debugRect">框选区域: --</div>
</div>

<!-- 首页 -->
<div id="homePage">
    <div class="box-container">
        <div class="cards-stack" id="cardsStack">
            <div class="card-item" data-idx="0">假日海滩</div>
            <div class="card-item" data-idx="1">三亚</div>
            <div class="card-item" data-idx="2">万宁</div>
            <div class="card-item" data-idx="3">椰林</div>
            <div class="card-item" data-idx="4">椰树海滩</div>
            <div class="card-item" data-idx="5">我的相册</div>
        </div>
    </div>
</div>

<!-- 交互页面 -->
<div id="interactPage">
    <button class="back-btn" id="btnBack">← 返回</button>
    <div class="gesture-hint" id="gestureHint">🤌 伸出手，拇指和食指张开</div>
    <div class="loading" id="loading">正在启动...</div>
    <canvas id="outputCanvas"></canvas>
</div>

<!-- 隐藏元素 -->
<input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
<video id="camVideo" playsinline autoplay muted></video>
<video id="seaVideo" loop muted playsinline></video>
<img id="userImage" style="display:none;">

<script>
// 视频配置（Pixabay官方CDN，无防盗链）
const BEACH_VIDEOS = [
    'https://cdn.pixabay.com/video/2020/05/25/40060-424961903_large.mp4',
    'https://cdn.pixabay.com/video/2019/08/28/26376-356447631_large.mp4',
    'https://cdn.pixabay.com/video/2021/02/18/66301-513622931_large.mp4',
    'https://cdn.pixabay.com/video/2016/08/22/14122-181421430_large.mp4',
    'https://cdn.pixabay.com/video/2020/06/02/40677-427615731_large.mp4'
];

const $ = s => document.querySelector(s);
const canvas = $('#outputCanvas');
const ctx = canvas.getContext('2d');
const camVideo = $('#camVideo');
const seaVideo = $('#seaVideo');
const userImage = $('#userImage');
const loading = $('#loading');
const gestureHint = $('#gestureHint');

let selectedIdx = 0;
let isRunning = false;
let frameCount = 0;
let selectRect = null;
let mediaStream = null;
let handsModel = null;
let customContentType = null;
let customContentURL = null;

// 更新调试信息
function updateDebug(id, text, type='info') {
    const el = $(id);
    el.textContent = text;
    el.className = 'debug-item';
    if(type === 'success') el.classList.add('debug-success');
    if(type === 'error') el.classList.add('debug-error');
    if(type === 'info') el.classList.add('debug-info');
}

// 首页卡片点击
$('#cardsStack').addEventListener('click', (e) => {
    const card = e.target.closest('.card-item');
    if(!card) return;
    
    selectedIdx = parseInt(card.dataset.idx);
    
    if(selectedIdx === 5) {
        $('#fileInput').click();
        return;
    }
    
    startInteract();
});

// 文件上传
$('#fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    
    if(customContentURL) URL.revokeObjectURL(customContentURL);
    customContentURL = URL.createObjectURL(file);
    
    if(file.type.startsWith('image/')) {
        customContentType = 'image';
        userImage.src = customContentURL;
        userImage.onload = () => startInteract();
    } else if(file.type.startsWith('video/')) {
        customContentType = 'video';
        seaVideo.src = customContentURL;
        seaVideo.onloadeddata = () => startInteract();
    }
};

// 返回按钮
$('#btnBack').onclick = () => {
    isRunning = false;
    $('#interactPage').classList.remove('active');
    $('#homePage').style.display = 'block';
    
    // 停止所有资源
    if(mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    seaVideo.pause();
    selectRect = null;
    frameCount = 0;
};

// 开始交互
function startInteract() {
    $('#homePage').style.display = 'none';
    $('#interactPage').classList.add('active');
    loading.style.display = 'block';
    loading.textContent = '正在启动摄像头...';
    updateDebug('#debugCamera', '摄像头状态: 启动中...', 'info');
    
    // 加载海景视频
    if(selectedIdx < 5) {
        customContentType = 'video';
        seaVideo.src = BEACH_VIDEOS[selectedIdx];
        seaVideo.onloadeddata = () => {
            seaVideo.play().catch(e => console.error('视频播放失败:', e));
        };
        seaVideo.load();
    }
    
    // 启动摄像头
    startCamera();
}

// 启动摄像头（纯原生JavaScript，不使用MediaPipe的Camera类）
async function startCamera() {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 640, height: 480 }
        });
        camVideo.srcObject = mediaStream;
        await camVideo.play();
        
        isRunning = true;
        loading.style.display = 'none';
        updateDebug('#debugCamera', '摄像头状态: 已启动 ✓', 'success');
        gestureHint.textContent = '🤌 伸出手，拇指和食指张开';
        
        // 初始化手势模型
        await initHandGesture();
        
        // 开始主循环
        mainLoop();
    } catch(e) {
        console.error('摄像头启动失败:', e);
        loading.textContent = '摄像头权限被拒绝';
        updateDebug('#debugCamera', '摄像头状态: 失败 ✗', 'error');
        gestureHint.textContent = '⚠️ 请允许摄像头权限';
    }
}

// 初始化手势模型
async function initHandGesture() {
    if (typeof Hands === 'undefined') {
        console.error('MediaPipe Hands 未加载');
        updateDebug('#debugModel', '模型状态: 加载失败 ✗', 'error');
        gestureHint.textContent = '⚠️ 手势模型加载失败';
        return;
    }
    
    loading.textContent = '正在加载手势模型...';
    updateDebug('#debugModel', '模型状态: 加载中...', 'info');
    
    try {
        handsModel = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });
        
        handsModel.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.1,
            minTrackingConfidence: 0.1
        });
        
        // 手动处理结果
        handsModel.onResults(onHandResults);
        
        await handsModel.initialize();
        
        console.log('手势模型加载成功');
        updateDebug('#debugModel', '模型状态: 已加载 ✓', 'success');
        gestureHint.textContent = '🤌 伸出手，拇指和食指张开';
    } catch(e) {
        console.error('模型初始化失败:', e);
        updateDebug('#debugModel', '模型状态: 初始化失败 ✗', 'error');
        gestureHint.textContent = '⚠️ 手势模型初始化失败';
    }
}

// 处理手势结果
function onHandResults(results) {
    frameCount++;
    updateDebug('#debugFrame', `帧处理: ${frameCount}`, 'info');
    
    if(!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        selectRect = null;
        updateDebug('#debugHand', '检测到手: 否', 'info');
        updateDebug('#debugFinger', '两指距离: --', 'info');
        updateDebug('#debugRect', '框选区域: --', 'info');
        return;
    }

    // 检测到一只手
    updateDebug('#debugHand', '检测到手: 是 ✓', 'success');
    
    const landmarks = results.multiHandLandmarks[0];
    const thumbTip = landmarks[4]; // 拇指指尖
    const indexTip = landmarks[8]; // 食指指尖
    
    // 计算两指距离（归一化坐标）
    const fingerDist = Math.hypot(
        thumbTip.x - indexTip.x,
        thumbTip.y - indexTip.y
    );
    
    updateDebug('#debugFinger', `两指距离: ${fingerDist.toFixed(3)}`, 'info');
    
    // 距离大于0.01就触发框选（极度灵敏）
    if(fingerDist > 0.01) {
        // 计算框选区域（归一化坐标）
        const x = Math.min(thumbTip.x, indexTip.x);
        const y = Math.min(thumbTip.y, indexTip.y);
        const w = Math.abs(thumbTip.x - indexTip.x);
        const h = Math.abs(thumbTip.y - indexTip.y);
        
        // 扩大框选区域
        const expand = 0.15;
        selectRect = {
            x: Math.max(0, x - expand),
            y: Math.max(0, y - expand),
            w: Math.min(1, w + expand*2),
            h: Math.min(1, h + expand*2)
        };
        
        updateDebug('#debugRect', 
            `x=${selectRect.x.toFixed(2)}, y=${selectRect.y.toFixed(2)}, w=${selectRect.w.toFixed(2)}, h=${selectRect.h.toFixed(2)}`, 
            'success'
        );
    } else {
        selectRect = null;
        updateDebug('#debugRect', '框选区域: --', 'info');
    }
}

// 主循环（纯原生JavaScript）
async function mainLoop() {
    if(!isRunning) return;
    
    try {
        // 1. 调整画布大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 2. 绘制摄像头画面（不镜像）
        ctx.drawImage(camVideo, 0, 0, canvas.width, canvas.height);
        
        // 3. 把摄像头帧传给手势模型
        if(handsModel && isRunning) {
            await handsModel.send({ image: camVideo });
        }
        
        // 4. 绘制框选区域的海景
        if(selectRect && selectRect.w > 0.01 && selectRect.h > 0.01) {
            const px = selectRect.x * canvas.width;
            const py = selectRect.y * canvas.height;
            const pw = selectRect.w * canvas.width;
            const ph = selectRect.h * canvas.height;

            ctx.save();
            ctx.beginPath();
            ctx.rect(px, py, pw, ph);
            ctx.clip();
            
            if(customContentType === 'image' && userImage.complete) {
                ctx.drawImage(userImage, 0, 0, canvas.width, canvas.height);
            } else if(customContentType === 'video' && seaVideo.readyState >= 3) {
                ctx.drawImage(seaVideo, 0, 0, canvas.width, canvas.height);
            }
            
            ctx.restore();

            // 绘制红色边框（调试用）
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 3;
            ctx.strokeRect(px, py, pw, ph);
        }
    } catch(e) {
        console.error('主循环错误:', e);
    }
    
    // 继续下一帧
    requestAnimationFrame(mainLoop);
}

// 页面加载完成
window.onload = () => {
    console.log('页面加载完成');
    updateDebug('#debugModel', '模型状态: 等待加载', 'info');
    updateDebug('#debugCamera', '摄像头状态: 未启动', 'info');
};
</script>
</body>
</html>
